<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>s8vr - Smart Invoicing</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" content="#09090b" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: 'var(--background)',
              surface: 'var(--surface)',
              surfaceHighlight: 'var(--surface-highlight)',
              border: 'var(--border)',
              textMain: 'var(--text-main)',
              textMuted: 'var(--text-muted)',
              primary: '#10b981', // Emerald 500 - used sparingly
              accent: '#10b981', // Emerald 500
              background: '#09090b', // Zinc 950
              surface: '#18181b', // Zinc 900
              textMain: '#a1a1aa', // Zinc 400
              textMuted: '#71717a', // Zinc 500
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'bell-ring': 'bell-ring 2s ease-in-out infinite',
              'shimmer': 'shimmer 2s infinite',
              'pulse-subtle': 'pulse-subtle 2s ease-in-out infinite',
            },
            keyframes: {
              'bell-ring': {
                '0%, 100%': { transform: 'rotate(0deg)' },
                '10%': { transform: 'rotate(15deg)' },
                '20%': { transform: 'rotate(-10deg)' },
                '30%': { transform: 'rotate(5deg)' },
                '40%': { transform: 'rotate(-5deg)' },
                '50%': { transform: 'rotate(0deg)' },
              },
              'shimmer': {
                '100%': { transform: 'translateX(100%)' },
              },
              'pulse-subtle': {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.5' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&family=Playfair+Display:wght@400;700&family=Roboto+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      /* Dark mode - applied when .dark class is on html */
      html.dark,
      html.dark body {
        --background: #09090b;
        --surface: #18181b;
        --surface-highlight: #27272a;
        --border: #27272a;
        --text-main: #a1a1aa;
        --text-muted: #71717a;
        --accent: #10b981;
      }

      /* Light mode - applied when .dark class is NOT on html */
      html:not(.dark),
      html:not(.dark) body {
        --background: #ffffff;
        --surface: #f9fafb;
        --surface-highlight: #f3f4f6;
        --border: #e5e7eb;
        --text-main: #111827;
        --text-muted: #6b7280;
        --accent: #10b981;
      }

      /* Date input styling - visible calendar icon */
      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
        cursor: pointer;
        opacity: 0.7;
      }

      :root:not(.dark) input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(0);
        opacity: 0.7;
      }

      /* Date picker calendar styling */
      input[type="date"] {
        color-scheme: dark;
      }

      :root:not(.dark) input[type="date"] {
        color-scheme: light;
      }

      body {
        background-color: var(--background);
        color: var(--text-main);
        font-family: 'Inter', sans-serif;
        font-weight: 400;
        transition: background-color 0.3s, color 0.3s;
        margin: 0;
        padding: 0;
      }
      
      #root {
        min-height: 100vh;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border); 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted); 
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Apply theme immediately on page load to prevent flash
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme !== 'light') {
        document.documentElement.classList.add('dark');
        document.body.classList.add('dark');
      }
    </script>
  </body>
</html>
